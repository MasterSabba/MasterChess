<!DOCTYPE html>
<html lang="it">
<head>
    <a href="https://mastersabba.github.io/MasterSabba/" target="_self" style="position: fixed; top: 10px; left: 10px; z-index: 9999; text-decoration: none; color: rgba(255, 255, 255, 0.2); font-family: sans-serif; font-size: 24px; padding: 10px; transition: color 0.3s ease;">✕</a>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MasterChess</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs7...", 
            authDomain: "mastersabba.firebaseapp.com",
            projectId: "mastersabba",
            storageBucket: "mastersabba.appspot.com",
            messagingSenderId: "565...",
            appId: "1:565..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.setDoc = setDoc;
        window.doc = doc;
        window.getDoc = getDoc;
    </script>
    
    <style>
        :root {
            --bg-deep: #0a0f1e;
            --bg-slate: #1e293b;
            --accent: #10b981;
            --text-light: #f8fafc;
            --text-dim: #64748b;
            --board-light: #f1f5f9;
            --board-dark: #64748b;
            --yellow: #ffeb3b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: var(--bg-deep);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            background: var(--bg-slate);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 360px;
            position: relative;
            transition: max-width 0.15s ease;
        }

        /* MODALITÀ GIOCO GRANDE: Sfrutta il 95% della larghezza su mobile e sale fino a 550px su schermi grandi */
        .container.game-mode {
            width: 95vw !important;
            max-width: 550px !important;
            padding: 12px;
        }

        h1 { font-weight: 800; font-size: 2.2rem; margin: 0 0 10px 0; letter-spacing: -1px; color: var(--yellow); }
        .hidden { display: none !important; }

        button {
            width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 15px;
            font-weight: bold; cursor: pointer; font-size: 1rem; text-transform: uppercase;
            background: linear-gradient(145deg, #10b981, #059669); color: white;
            box-shadow: 0 5px 0 #047857, 0 8px 15px rgba(0,0,0,0.4); transition: 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #047857; }
        .btn-sec { background: linear-gradient(145deg, #334155, #1e293b); color: var(--text-light); box-shadow: 0 5px 0 #0f172a; }

        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155;
            background: #0a0f1e; color: white; text-align: center; font-weight: 600; font-size: 1rem;
        }

        /* Scacchiera fluida al 100% del suo contenitore espanso */
        #myBoard { 
            width: 100% !important;
            max-width: 100% !important;
            border: 4px solid #0f001d; 
            border-radius: 10px; 
            margin: 6px 0;
            display: block;
        }

        .white-1e1d7 { background-color: var(--board-light) !important; }
        .black-3c85d { background-color: var(--board-dark) !important; }
        .highlight-move { box-shadow: inset 0 0 3px 3px rgba(255, 255, 0, 0.7); }
        .highlight-hint { background: radial-gradient(circle, rgba(16, 185, 129, 0.6) 20%, transparent 25%) !important; }

        #status-bar {
            background: rgba(255,255,255,0.05);
            padding: 6px 15px; border-radius: 50px;
            font-size: 0.85rem; font-weight: 700; color: var(--yellow);
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 6px;
        }

        .graveyard {
            display: flex; gap: 3px; height: 32px; width: 100%;
            background: rgba(0,0,0,0.2); border-radius: 8px; padding: 4px;
            align-items: center; overflow: hidden; margin: 4px 0;
        }

        #result-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.95); border-radius: 25px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        #res-txt { font-size: 2rem; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; }
        .res-win { color: var(--accent); text-shadow: 0 0 20px var(--accent); }
        .res-lose { color: #ff3131; text-shadow: 0 0 20px #ff3131; }

        #code-box { background: #000; color: var(--accent); padding: 15px; border-radius: 10px; font-family: monospace; border: 1px dashed var(--accent); margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="result-screen" class="hidden">
        <h2 id="res-txt">VITTORIA</h2>
        <button onclick="location.reload()" style="width: 80%">MENU PRINCIPALE</button>
    </div>

    <div id="p-home">
        <h1>MASTER CHESS</h1>
        <div style="margin-bottom: 15px; opacity: 0.8;">Giocatore: <span id="lb-nick" style="color:var(--accent)">...</span></div>
        <div style="margin-bottom: 15px; opacity: 0.8;">Punti: <span id="pts">0</span></div>
        <button onclick="initSingle()">GIOCATORE SINGOLO</button>
        <button onclick="nav('p-friends')">MULTIPLAYER ONLINE</button>
    </div>

    <div id="p-friends" class="hidden">
        <h1>ONLINE P2P</h1>
        <button onclick="createRoom()">CREA PARTITA (ID)</button>
        <div id="code-box" class="hidden">...</div>
        <input type="text" id="remote-id" placeholder="Incolla Codice Amico" maxlength="5">
        <button onclick="connectToPeer()">ENTRA IN PARTITA</button>
        <button class="btn-sec" onclick="nav('p-home')">INDIETRO</button>
    </div>

    <div id="p-game" class="hidden">
        <div id="status-bar">Inizializzazione...</div>
        <div id="top-captured" class="graveyard"></div>
        <div id="myBoard"></div>
        <div id="bottom-captured" class="graveyard"></div>
        <button class="btn-sec" onclick="location.reload()">ABBANDONA</button>
    </div>
</div>

<script>
    var board = null;
    var game = new Chess();
    var myColor = 'w';
    var isMP = false;
    var conn = null;
    var active = false;
    var peer = null;

    let userNick = localStorage.getItem('tris_nick') || "Player"; 
    let score = parseInt(localStorage.getItem('chess_score')) || 0;
    
    document.getElementById('lb-nick').innerText = userNick;
    document.getElementById('pts').innerText = score;

    function nav(id) {
        const container = document.getElementById('main-container');
        document.querySelectorAll('.container > div').forEach(d => {
            if(d.id !== 'result-screen') d.classList.add('hidden');
        });
        
        if(id === 'p-game') {
            container.classList.add('game-mode');
        } else {
            container.classList.remove('game-mode');
        }
        
        document.getElementById(id).classList.remove('hidden');

        // Aggressività nel forzare il resize su schermi a comparsa elastica
        if(id === 'p-game' && board) {
            board.resize();
            setTimeout(() => { board.resize(); }, 30);
            setTimeout(() => { board.resize(); }, 100);
            setTimeout(() => { board.resize(); }, 250);
        }
    }

    async function savePoints(newScore) {
        score = newScore;
        localStorage.setItem('chess_score', score);
        localStorage.setItem('points_masterchess', score);
        document.getElementById('pts').innerText = score;

        if (window.db && userNick !== "Player") {
            try {
                const userRef = window.doc(window.db, "users", userNick);
                await window.setDoc(userRef, { 
                    MasterChess: score,
                    points_masterchess: score 
                }, { merge: true });
                console.log("Punteggio aggiornato globalmente su Firestore!");
            } catch (e) {
                console.error("Errore durante il salvataggio Firestore: ", e);
            }
        }
    }

    function createRoom() {
        const id = Math.random().toString(36).substring(2, 7).toUpperCase();
        peer = new Peer('CHESS-' + id);
        peer.on('open', () => {
            const box = document.getElementById('code-box');
            box.innerText = "CODICE: " + id;
            box.classList.remove('hidden');
        });
        peer.on('connection', c => {
            conn = c; myColor = 'w'; isMP = true;
            game.reset();
            board.orientation('white');
            board.start();
            setupMP();
            startGameUI();
        });
    }

    function connectToPeer() {
        const id = document.getElementById('remote-id').value.trim().toUpperCase();
        if (!id) return;
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect('CHESS-' + id);
            conn.on('open', () => {
                myColor = 'b'; isMP = true;
                game.reset();
                board.orientation('black');
                board.start();
                setupMP();
                startGameUI();
            });
        });
    }

    function setupMP() {
        conn.on('data', data => {
            let move = game.move({ from: data.from, to: data.to, promotion: data.promotion });
            if (move) {
                board.position(game.fen());
                updateUI(move);
            }
        });
    }

    function startGameUI() {
        nav('p-game');
        active = true;
        updateUI();
    }

    function onDragStart(source, piece) {
        if (game.game_over() || !active) return false;
        if (isMP && piece.charAt(0) !== myColor) return false;
        if (!isMP && game.turn() === 'b') return false;

        game.moves({ square: source, verbose: true }).forEach(m => {
            $(`.square-${m.to}`).addClass('highlight-hint');
        });
    }

    function onDrop(source, target) {
        $('.highlight-hint').removeClass('highlight-hint');
        let move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        
        if (isMP) {
            conn.send({ from: move.from, to: move.to, promotion: move.promotion });
        }
        updateUI(move);
        if (!isMP && !game.game_over()) setTimeout(makeBestAIByCapture, 600);
    }

    function makeBestAIByCapture() {
        let moves = game.moves({ verbose: true });
        if (moves.length === 0) return;

        moves.sort((a, b) => {
            let aCap = a.captured ? 1 : 0;
            let bCap = b.captured ? 1 : 0;
            return bCap - aCap;
        });

        let aiMove = game.move({ from: moves[0].from, to: moves[0].to, promotion: 'q' });
        board.position(game.fen());
        updateUI(aiMove);
    }

    function updateUI(move) {
        $('.highlight-move').removeClass('highlight-move');
        
        if (move) {
            $(`.square-${move.from}`).addClass('highlight-move');
            $(`.square-${move.to}`).addClass('highlight-move');
            
            if (move.captured) {
                const img = `https://chessboardjs.com/img/chesspieces/wikipedia/${(move.color === 'w' ? 'b' : 'w') + move.captured.toUpperCase()}.png`;
                $(`#${move.color === myColor ? 'bottom-captured' : 'top-captured'}`).append(`<img src="${img}" style="width:18px; opacity:0.7;">`);
            }
        }

        let status = game.turn() === 'w' ? "TURNO: BIANCO" : "TURNO: NERO";
        if (game.in_check()) status = "⚠️ SCACCO!";
        document.getElementById('status-bar').innerText = status;

        if (game.game_over()) {
            active = false;
            const res = document.getElementById('result-screen');
            const txt = document.getElementById('res-txt');
            res.classList.remove('hidden');

            if (game.in_checkmate()) {
                let win = (game.turn() !== myColor);
                if (win) {
                    txt.innerText = "👑 VITTORIA";
                    txt.className = "res-win";
                    savePoints(score + 10);
                } else {
                    txt.innerText = "SCONFITTA";
                    txt.className = "res-lose";
                    savePoints(Math.max(0, score - 5));
                }
            } else {
                txt.innerText = "PATTA";
                txt.className = "";
            }
        }
    }

    function initSingle() {
        isMP = false; 
        game.reset();
        board.orientation('white');
        board.start();
        document.getElementById('top-captured').innerHTML = "";
        document.getElementById('bottom-captured').innerHTML = "";
        startGameUI();
    }

    board = Chessboard('myBoard', {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: () => board.position(game.fen()),
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });

    $(window).resize(board.resize);
</script>
</body>
</html>
